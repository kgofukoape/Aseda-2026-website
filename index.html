<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aseda – Beyond Infrastructure</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#002D54;
    --navy-mid:#003d70;
    --navy-light:#004d8a;
    --orange:#FF8C00;
    --orange-light:#ffaa40;
    --white:#FFFFFF;
    --grey:#E5E5E5;
    --border:#003d70;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}

  /* NAV (Clean Fix) */
  nav{position:sticky;top:0;z-index:100;padding:18px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,45,84,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,140,0,0.2)}
  .nav-logo{display:flex;flex-direction:column;gap:0px}
  .nav-logo svg{width:130px;height:auto}
  .nav-logo-sub{font-size:9px;letter-spacing:5px;color:var(--orange);text-transform:uppercase;font-weight:500;margin-top:3px}
  .nav-links{display:flex;gap:36px;align-items:center}
  .nav-links a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s}
  .nav-links a:hover{color:var(--orange)}
  .nav-cta{background:var(--orange);color:var(--white)!important;padding:10px 24px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none}
  
  .nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:5px}
  .nav-hamburger span{display:block;width:24px;height:2px;background:var(--white);transition:0.3s}
  .nav-mobile{display:none;position:fixed;top:73px;left:0;right:0;background:rgba(0,45,84,0.98);padding:20px 24px;flex-direction:column;gap:15px;z-index:99;border-bottom:1px solid var(--orange)}
  .nav-mobile.open{display:flex}

  @media(max-width:1024px){
    nav{padding:18px 30px}
    .nav-links{display:none}
    .nav-hamburger{display:flex}
  }

  /* HERO VIDEO */
  .hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden}
  .hero-video-wrap{position:absolute;inset:0;z-index:0}
  .hero-video-wrap video{width:100%;height:100%;object-fit:cover;transform:scale(1.1);}
  .hero-video-overlay{position:absolute;inset:0;background:linear-gradient(105deg, rgba(0,45,84,0.88) 0%, rgba(0,45,84,0.75) 40%, rgba(0,20,40,0.55) 100%);z-index:1}
  .hero-video-grain{position:absolute;inset:0;z-index:2;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px}
  .hero-left{position:relative;z-index:3;padding:160px 60px 120px;max-width:780px}
  .hero-tag{display:inline-flex;align-items:center;gap:10px;margin-bottom:32px}
  .hero-tag-line{width:40px;height:2px;background:var(--orange)}
  .hero-tag-text{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--orange);font-weight:500}
  h1{font-family:'Cormorant Garamond',serif;font-size:88px;line-height:1.0;font-weight:300;margin-bottom:28px}
  h1 em{font-style:italic;color:var(--orange)}
  .hero-sub{font-size:16px;line-height:1.85;color:rgba(255,255,255,0.7);max-width:520px;margin-bottom:52px;font-weight:300}
  .hero-actions{display:flex;gap:16px;align-items:center;margin-bottom:80px}
  .btn-primary{background:var(--orange);color:var(--white);padding:18px 40px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:inline-block;transition:background 0.2s}
  .btn-ghost{color:var(--white);padding:18px 40px;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(255,255,255,0.35);display:inline-block;transition:all 0.2s;backdrop-filter:blur(4px)}
  .hero-badges{display:flex;gap:20px;flex-wrap:wrap}
  .hero-badge{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(8px);padding:16px 24px;display:flex;flex-direction:column;gap:4px;min-width:140px}
  .badge-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--orange);line-height:1}
  .badge-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:500}

  /* STATS */
  .stats{background:var(--orange);padding:28px 60px;display:grid;grid-template-columns:repeat(4,1fr)}
  .stat-item{padding:0 40px;border-right:1px solid rgba(0,45,84,0.25);display:flex;flex-direction:column;gap:4px}
  .stat-item:last-child{border-right:none}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:var(--navy);line-height:1}
  .stat-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,45,84,0.65);font-weight:500}

  /* ABOUT */
  .about{padding:100px 60px;display:grid;grid-template-columns:1fr 2fr;gap:80px;align-items:start;border-bottom:1px solid var(--border)}
  .sec-label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--orange);font-weight:500;padding-top:8px}
  h2{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;line-height:1.2;margin-bottom:24px}
  .body-text{font-size:15px;line-height:1.9;color:rgba(255,255,255,0.6);font-weight:300;max-width:680px;margin-bottom:32px}
  .pills{display:flex;gap:12px;flex-wrap:wrap}
  .pill{padding:8px 20px;border:1px solid rgba(255,140,0,0.4);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:500}

  /* SERVICES */
  .services{padding:0 60px 100px;border-bottom:1px solid var(--border)}
  .sec-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px;padding-top:80px}
  .sec-link{color:var(--orange);font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;font-weight:500}
  .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
  .svc{background:var(--navy);padding:48px 40px;position:relative;overflow:hidden;cursor:pointer}
  .svc-num{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;color:rgba(255,140,0,0.09);line-height:1;margin-bottom:24px}
  .svc-title{font-size:17px;font-weight:600;margin-bottom:14px}
  .svc-desc{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.5);font-weight:300}

  /* PROJECTS */
  .projects{padding:80px 60px;border-bottom:1px solid var(--border)}
  .proj-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:auto auto;gap:2px;background:var(--border);margin-top:48px}
  .proj{background:var(--navy-mid);padding:40px;position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer}
  .proj.featured{grid-row:1/3;min-height:460px}
  .proj-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--orange);margin-bottom:8px}
  .proj-title{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4}
  .proj-loc{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase}
  .proj-tag{display:inline-block;margin-bottom:16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,140,0,0.65);font-weight:500}

  /* TRANSFORMATION */
  .transform{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  .transform-left{background:var(--orange);padding:80px 60px;display:flex;flex-direction:column;justify-content:space-between}
  .transform-left h2{color:var(--navy);font-size:52px}
  .transform-text{font-size:14px;line-height:1.9;color:rgba(0,45,84,0.72);font-weight:300;margin-bottom:40px}
